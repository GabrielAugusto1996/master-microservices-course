services:
  accounts:
    image: "eazybytes/accounts/s4"
    container_name: "accounts-microservice"
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - eazybank
  loans:
    image: "eazybytes/loans/s4"
    container_name: "loans-microservice"
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks: # Must provided the same network name to the services communicate each others
      - eazybank
  cards:
    image: "eazybytes/cards/s4"
    container_name: "cards-microservice"
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - eazybank
networks:
  eazybank:
    driver: "bridge"