server:
  port: 9010

spring:
  application:
    name: "message"
  cloud:
    function:
      definition: email|sms
    stream:
      bindings:
        emailsms-in-0:
          destination: eazybank.send-communication-started
          group: eazybank-${spring.application.name}send-communication-started
        emailsms-out-0:
          destination: eazybank.send-communication-processed
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 10s