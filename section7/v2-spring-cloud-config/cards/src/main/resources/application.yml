server:
  port: 9000
spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/cardsdb
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  config:
    import: "optional:configserver:http://localhost:8071/"
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    sql:
      init:
        mode: always
  application:
    name: cards
  profiles:
    active: "prod"
build:
  version: "1.0"

management:
  endpoints:
    web:
      exposure:
        include: "*"