server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accountsdb
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  config:
    import: "optional:configserver:http://localhost:8071/"
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    sql:
      init:
        mode: always
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  application:
    name: accounts
  profiles:
    active: "prod"
build:
  version: "1.0"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true


eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: "accounts"
    description: "Eazy Bank Accounts Application"
    version: "1.0.0"
    swagger-url: http://localhost:${server.port}/swagger-ui.html
    api-docs-url: http://localhost:${server.port}/api-docs

logging:
  level:
    com:
      eazybytes:
        gatewayserver: DEBUG

resilience4j:
  circuitbreaker:
    configs:
      default:
        # Minimum number of calls required before calculating the failure rate.
        # Until this number is reached, the circuit will not OPEN regardless
        # of how many failures occur.
        minimumNumberOfCalls: 10

        # Number of recent calls used to calculate the failure rate.
        slidingWindowSize: 10

        # Failure percentage required to OPEN the circuit.
        failureRateThreshold: 50

        # Time the circuit stays OPEN before moving to HALF_OPEN.
        waitDurationInOpenState: 10s

        # Number of trial calls allowed in HALF_OPEN.
        permittedNumberOfCallsInHalfOpenState: 2